name: Build & Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: macos-26          # Apple Silicon runner (has Xcode + Swift)
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          swiftc --version

      - name: Build app bundle
        run: make bundle

      - name: Create release zip
        run: make release-zip

      - name: Upload artifact (available on every run)
        uses: actions/upload-artifact@v4
        with:
          name: PlainPaste
          path: build/PlainPaste.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build release zip
        run: make release-zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: build/PlainPaste.zip
