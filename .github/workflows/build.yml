name: Build & Release

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  # Trigger a release when you push a version tag
  # e.g.  git tag v1.0.0 && git push origin v1.0.0
  release:
    types: [created]

jobs:
  build:
    runs-on: macos-14          # Apple Silicon runner (has Xcode + Swift)
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          swiftc --version

      - name: Build app bundle
        run: make bundle

      - name: Create release zip
        run: make release-zip

      - name: Upload artifact (available on every run)
        uses: actions/upload-artifact@v4
        with:
          name: PlainPaste
          path: build/PlainPaste.zip

  release:
    needs: build
    if: github.event_name == 'release'
    runs-on: macos-14
    permissions:
      contents: write            # needed to upload release assets
    steps:
      - uses: actions/checkout@v4

      - name: Build release zip
        run: |
          make release-zip

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/PlainPaste.zip
